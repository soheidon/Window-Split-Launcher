<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Window Split Launcher Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>Window Split Launcher Settings</h1>

    <div class="form-group">
      <label for="defaultUrl">Default URL</label>
      <input type="text" id="defaultUrl" placeholder="https://chatgpt.com/">
    </div>

    <div class="form-group">
      <label>Open configured URL</label>
      <div class="radio-group">
        <label class="radio-label">
          <input type="radio" name="targetPosition" value="left">
          Left
        </label>
        <label class="radio-label">
          <input type="radio" name="targetPosition" value="right">
          Right
        </label>
      </div>
    </div>

    <div class="form-group">
      <label for="mainRatio">Layout ratio<br><span class="label-hint">Current window : Target URL window</span></label>
      <div class="range-row">
        <input type="range" id="mainRatio" min="50" max="75" step="5" value="60">
        <span id="ratioValue" class="range-value">60 : 40</span>
      </div>
    </div>

    <div class="form-group">
      <label for="overlapPx">Window overlap adjustment</label>
      <div class="range-row">
        <input type="range" id="overlapPx" min="0" max="20" value="8">
        <span id="overlapValue" class="range-value">8px</span>
      </div>
      <span class="label-hint">Overlap windows slightly to hide gaps caused by window borders and shadows. Adjust if you see a gap between the two windows.</span>
    </div>

    <div class="actions">
      <button id="saveBtn">Save</button>
      <span id="status" class="status"></span>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
